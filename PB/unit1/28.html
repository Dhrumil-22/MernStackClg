<!-- Write a JSON script to define Name,DOB,Age and birthplace of one 
person. Then print his birthdate in console as well as in chrome after 
clicking birthdate button. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="p0"></p>
    <button onclick="dun1()">Birthdate</button>
    <script>
        let obj = {
            'p1' : {
                'name':'Mahek',
                'DOB':'28/04/2007',
                'age':'19',
                'Birthplace':'Porbander',
            }
        }
        console.log(obj.p1.DOB)
        function dun1(){
            document.getElementById("p0").innerHTML=obj.p1.DOB
        }
    </script>
</body>
</html>

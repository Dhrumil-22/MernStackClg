<!-- write a code to increse the font size at interval of 1sec and it should stop incrseing when the font size reaches too 50px.
 this task shoudl be perform when you click on increse btn on browser default font size is 15px -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="a0" >Hello</p>
    <button onclick="start()">increse</button>
  
    <script>
        let font = 15 ;

        function start(){
            setInterval(function(){
                    if(font<50)
                    {
                        fun(font++)
                    }
                },1000);
            }
            
            function fun(size){
                document.getElementById("a0").style.fontSize=size+"px";

        }

    </script>
</body>
</html>
